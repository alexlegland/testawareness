<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTO Module 2: Commitment Strategies — FinOps Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .commitment-table { width:100%; border-collapse:collapse; font-size:0.83rem; margin:14px 0; }
    .commitment-table th { background:var(--surface2); color:var(--text-muted); padding:8px 14px; text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
    .commitment-table td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:top; line-height:1.5; }
    .commitment-table tr:last-child td { border-bottom:none; }
    .commitment-table .name { font-weight:700; }
    .commitment-table .saving { color:var(--success); font-weight:700; }
    .commitment-table .risk   { color:var(--warning); }

    .calc-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin: 14px 0;
    }
    .calc-box h4 { font-size: 0.88rem; font-weight: 700; margin-bottom: 14px; }
    .calc-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .calc-row:last-child { border-bottom:none; font-weight:700; }
    .calc-row.highlight .val { color:var(--success); font-size:1.05rem; }
    .calc-row .lbl { color:var(--text-muted); }
    .calc-row .val { font-weight:600; }

    .scenario-cards { display:flex; flex-direction:column; gap:10px; margin:12px 0; }
    .sc-card {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sc-card:hover:not(.locked) { border-color: var(--primary); }
    .sc-card.locked { cursor: default; }
    .sc-card.chosen.good { border-color: var(--success); background: rgba(34,197,94,0.06); }
    .sc-card.chosen.ok   { border-color: var(--warning); background: rgba(245,158,11,0.06); }
    .sc-card.chosen.bad  { border-color: var(--danger);  background: rgba(239,68,68,0.06); }
    .sc-title  { font-weight:700; font-size:0.92rem; margin-bottom:4px; }
    .sc-sub    { font-size:0.8rem; color:var(--text-muted); }
    .sc-reveal { display:none; margin-top:10px; padding:10px 14px; background:rgba(0,0,0,0.2); border-radius:8px; font-size:0.82rem; line-height:1.6; }
    .sc-card.chosen .sc-reveal { display:block; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><span class="logo-icon">💸</span>FinOps Academy</a>
  <span class="nav-badge">CTO · Module 2 of 6</span>
</nav>

<main class="training-page">
  <div class="progress-header">
    <div class="progress-info">
      <span class="step-label" id="step-label">Step 1 of 4</span>
      <span id="score-display">Score: 0 pts</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
  <div id="step-container"></div>
</main>

<script>
var currentStep = 0;
var score = 0;
var decisionMade = false;

function choose(idx) {
  if (decisionMade) return;
  decisionMade = true;
  var outcomes = ['good','ok','bad','ok'];
  var pts      = [160,   80,  0,   80];
  score += pts[idx];
  document.getElementById('score-display').textContent = 'Score: ' + score + ' pts';
  document.querySelectorAll('.sc-card').forEach(function(c) { c.classList.add('locked'); });
  var card = document.getElementById('sc-' + idx);
  card.classList.add('chosen', outcomes[idx]);
  document.getElementById('dec-next').disabled = false;
}

function nextStep() { currentStep++; renderStep(); }

function renderStep() {
  var total = 4;
  document.getElementById('progress-bar').style.width = Math.round((currentStep / total) * 100) + '%';
  document.getElementById('step-label').textContent = 'Step ' + (currentStep + 1) + ' of ' + total;
  var c = document.getElementById('step-container');

  if (currentStep === 0) {
    c.innerHTML = `
      <div class="step-card">
        <div class="step-type tip">📅 Commitment Strategies</div>
        <h2>Three ways to pay less for the same compute</h2>
        <p style="color:var(--text-muted);margin-bottom:16px">AWS, GCP, and Azure all offer discounts in exchange for usage commitments. The mechanism differs — here's how each works.</p>

        <table class="commitment-table">
          <thead>
            <tr><th>Option</th><th>Mechanism</th><th>Savings</th><th>Risk / constraint</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="name">Reserved Instances (RI)</td>
              <td>Commit to a specific instance type, region, and term (1 or 3 years). Prepay all, partial, or nothing upfront.</td>
              <td class="saving">Up to 72%</td>
              <td class="risk">Locked to specific instance type. Less flexible if you migrate or change family.</td>
            </tr>
            <tr>
              <td class="name">Compute Savings Plans</td>
              <td>Commit to a $/hour spend for 1 or 3 years. Applies automatically across EC2, Lambda, Fargate, any region, any size.</td>
              <td class="saving">Up to 66%</td>
              <td class="risk">You pay the committed amount even if you use less. Over-committing is costly.</td>
            </tr>
            <tr>
              <td class="name">EC2 Instance Savings Plans</td>
              <td>Like Compute Savings Plans but locked to an instance family in a region. Slightly higher discount.</td>
              <td class="saving">Up to 72%</td>
              <td class="risk">Less flexible than Compute Savings Plans — applies only to chosen family/region.</td>
            </tr>
            <tr>
              <td class="name">Spot Instances</td>
              <td>Bid on unused AWS capacity. No commitment required — prices fluctuate, instances can be reclaimed.</td>
              <td class="saving">Up to 90%</td>
              <td class="risk">Instances can be interrupted with 2-min notice. Suitable only for fault-tolerant workloads.</td>
            </tr>
          </tbody>
        </table>

        <div class="tip-card">
          <strong>The key question before committing:</strong> What percentage of your compute baseline is truly stable? Commit only on what you're confident you'll use continuously. Leave variable, seasonal, or uncertain workloads on on-demand.
        </div>

        <div class="step-actions">
          <a href="cto.html" class="btn btn-ghost">← Back to track</a>
          <button class="btn btn-primary" onclick="nextStep()">See the math →</button>
        </div>
      </div>`;

  } else if (currentStep === 1) {
    c.innerHTML = `
      <div class="step-card">
        <div class="step-type challenge">🧮 The Savings Calculator</div>
        <h2>Your profile: $80K/month compute, all on-demand</h2>
        <p style="color:var(--text-muted);margin-bottom:14px">After analysing 6 months of CloudWatch data, your team determines that 65% of compute is stable baseline running 24/7. The remaining 35% is variable (feature launches, batch jobs, seasonal peaks).</p>

        <div class="calc-box">
          <h4>Scenario: 1-year Compute Savings Plan at 65% coverage</h4>
          <div class="calc-row"><span class="lbl">Total on-demand compute</span><span class="val">$80,000/mo</span></div>
          <div class="calc-row"><span class="lbl">Stable baseline (65%)</span><span class="val">$52,000/mo</span></div>
          <div class="calc-row"><span class="lbl">Variable (35%) — stays on-demand</span><span class="val">$28,000/mo</span></div>
          <div class="calc-row"><span class="lbl">Savings Plan rate (1yr, no upfront)</span><span class="val">~36% off</span></div>
          <div class="calc-row"><span class="lbl">Savings on committed portion</span><span class="val" style="color:var(--success)">−$18,720/mo</span></div>
          <div class="calc-row highlight"><span class="lbl">New monthly compute bill</span><span class="val">$61,280/mo</span></div>
          <div class="calc-row highlight"><span class="lbl">Annual saving</span><span class="val">$224,640/yr</span></div>
        </div>

        <div class="calc-box">
          <h4>3-year plan comparison (same 65% coverage)</h4>
          <div class="calc-row"><span class="lbl">3yr Compute Savings Plan rate</span><span class="val">~52% off</span></div>
          <div class="calc-row"><span class="lbl">Savings on committed portion</span><span class="val" style="color:var(--success)">−$27,040/mo</span></div>
          <div class="calc-row highlight"><span class="lbl">Annual saving</span><span class="val">$324,480/yr</span></div>
          <div class="calc-row"><span class="lbl">Additional saving vs. 1yr</span><span class="val" style="color:var(--warning)">+$99,840/yr but locked for 3 years</span></div>
        </div>

        <div class="scenario-box">
          The $100K/yr delta between 1-year and 3-year is real — but so is the lock-in risk. If you shift to a different cloud, change architecture significantly, or grow faster than expected, the 3-year commitment limits your options.
        </div>

        <div class="step-actions">
          <span></span>
          <button class="btn btn-primary" onclick="nextStep()">Make the call →</button>
        </div>
      </div>`;

  } else if (currentStep === 2) {
    decisionMade = false;
    var options = [
      { title: '① 1-year Compute Savings Plan at 65% coverage', sub: '$224K/yr saving. Flexible — applies across any EC2, Lambda, Fargate.', reveal: 'This is the standard recommended approach for most companies. 65% matches your stable baseline, so you\'re not over-committing. The 1-year term limits lock-in risk. Compute Savings Plans apply automatically across regions and instance families, which makes them resilient to architecture changes.' },
      { title: '② 3-year plan at 65% coverage', sub: '$324K/yr saving. Significant upside, significant lock-in.', reveal: '3-year commitments make sense when you have high confidence in your architecture and cloud provider choice for that period. If there\'s any possibility of significant architecture change, cloud migration, or acquisition, 3 years is a long time. Many CTOs do 1-year first, then evaluate 3-year on renewal.' },
      { title: '③ Commit 90% of compute to maximize savings', sub: 'Maximize discount, minimize on-demand exposure.', reveal: 'Over-committing is the most common Savings Plan mistake. You pay for committed spend whether you use it or not. If your variable workload drops (seasonal lulls, slower growth), you\'re paying for compute you don\'t need. The standard advice: commit to your P10 baseline — the amount you\'re confident you\'ll run even in low-activity periods.' },
      { title: '④ Stay on-demand — too much uncertainty to commit', sub: 'No lock-in. Full flexibility. Full price.', reveal: 'Staying fully on-demand is the right call if you have genuine uncertainty — a major architecture migration in progress, active cloud provider evaluation, or very variable workloads with no stable baseline. For most mature products with 6+ months of stable compute data, however, some level of commitment is almost always justified.' }
    ];

    var cards = options.map(function(o, i) {
      return '<div class="sc-card" id="sc-' + i + '" onclick="choose(' + i + ')">' +
        '<div class="sc-title">' + o.title + '</div>' +
        '<div class="sc-sub">' + o.sub + '</div>' +
        '<div class="sc-reveal">' + o.reveal + '</div>' +
      '</div>';
    }).join('');

    c.innerHTML = `
      <div class="step-card">
        <div class="step-type scenario">🎯 Decision — up to 160 pts</div>
        <h2>What do you recommend to the CFO?</h2>
        <p style="color:var(--text-muted);margin-bottom:16px">Your company is 3 years old, growing steadily, no planned cloud migrations. The CFO wants to reduce cloud spend without impacting reliability. You have 6 months of compute usage data showing a stable 65% baseline.</p>
        <div class="scenario-cards">${cards}</div>
        <div class="step-actions">
          <span></span>
          <button class="btn btn-primary" id="dec-next" onclick="nextStep()" disabled>See results →</button>
        </div>
      </div>`;

  } else if (currentStep === 3) {
    var max = 160;
    var pct = Math.round((score / max) * 100);
    var badge, headline, desc;
    if (pct >= 75)     { badge = '🏆'; headline = 'Commitment-savvy CTO!'; desc = 'You matched coverage to your actual stable baseline and chose the right term length for your risk tolerance. That\'s how you capture savings without over-committing.'; }
    else if (pct >= 45){ badge = '🎯'; headline = 'Good instincts!'; desc = 'Commitment strategy is about the coverage percentage as much as the discount rate. Committing your stable baseline and keeping variable spend on-demand is the right framework.'; }
    else               { badge = '📚'; headline = 'Keep building!'; desc = 'The key rule: only commit what you\'re confident you\'ll use. Savings Plan waste (paying for committed compute you don\'t use) is more expensive than staying on-demand for that portion.'; }

    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('step-label').textContent = 'Completed! 🎉';

    c.innerHTML = `
      <div class="step-card results-card">
        <div class="results-badge">${badge}</div>
        <h2>${headline}</h2>
        <div class="results-score">${score}<span style="font-size:2rem;color:var(--text-muted)">/${max}</span></div>
        <p>${desc}</p>
        <div class="xp-gained">🏆 +${score} XP earned</div>
        <div class="takeaways">
          <h3>Key Takeaways</h3>
          <ul>
            <li>Compute Savings Plans are the most flexible AWS commitment — they apply automatically across EC2 instance families, regions, Lambda, and Fargate.</li>
            <li>Commit your stable baseline (P10 compute) — the amount you'd run even in low-traffic periods. Leave variable workloads on on-demand.</li>
            <li>1-year vs. 3-year is a risk/reward tradeoff: ~$100K/yr delta at this spend level, but 3 years is a long commitment if your architecture is evolving.</li>
            <li>Over-committing is a common and expensive mistake — you pay the committed amount whether you use it or not.</li>
            <li>Review utilisation of existing commitments quarterly. AWS Cost Explorer shows savings plan coverage and utilisation — you want both above 80%.</li>
          </ul>
        </div>
        <div class="results-actions">
          <a href="cto.html" class="btn btn-primary">Back to track →</a>
          <a href="index.html" class="btn btn-ghost">← Home</a>
        </div>
      </div>`;
  }
}

renderStep();
</script>
<script src="auth.js"></script>
<script src="progress.js"></script>
</body>
</html>
