<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join your team — FinOps Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; box-sizing:border-box; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 44px; width:100%; max-width:440px; box-shadow:0 24px 64px rgba(0,0,0,0.4); }
    .auth-logo { display:flex; align-items:center; gap:10px; font-size:1.2rem; font-weight:800; margin-bottom:28px; }
    .auth-logo .logo-icon { font-size:1.6rem; }
    .invite-banner { border-radius:12px; padding:16px 18px; margin-bottom:24px; }
    .ib-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; opacity:0.7; margin-bottom:4px; }
    .ib-org { font-size:1.1rem; font-weight:800; }
    .ib-role { font-size:0.85rem; font-weight:600; margin-top:3px; opacity:0.85; }
    h1 { font-size:1.4rem; font-weight:800; margin-bottom:6px; }
    .auth-sub { color:var(--text-muted); font-size:0.87rem; margin-bottom:24px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:0.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .form-group input { width:100%; padding:11px 14px; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:0.92rem; font-family:inherit; outline:none; box-sizing:border-box; transition:border-color 0.15s; }
    .form-group input:focus { border-color:var(--primary); }
    .auth-btn { width:100%; padding:13px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity 0.15s; }
    .auth-btn:hover { opacity:0.9; }
    .auth-btn:disabled { opacity:0.5; cursor:default; }
    .auth-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:10px 14px; color:var(--danger); font-size:0.82rem; margin-bottom:14px; display:none; }
    .invalid-card { text-align:center; padding:24px; }
    .invalid-card h2 { margin-bottom:8px; }
    .invalid-card p { color:var(--text-muted); font-size:0.88rem; }
  </style>
</head>
<body>
  <div class="auth-card" id="card-container">
    <div class="auth-logo"><span class="logo-icon">💸</span> FinOps Academy</div>
    <div id="card-content"><p style="color:var(--text-muted)">Loading invite…</p></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    var token = new URLSearchParams(window.location.search).get('token');
    var _invite = null;
    var _org = null;

    // Already logged in?
    FinOpsAuth.getCurrentUser().then(function(u){ if(u) window.location.href='index.html'; });

    async function init() {
      if (!token) { renderInvalid(); return; }
      _invite = await FinOpsAuth.getInviteByToken(token);
      if (!_invite) { renderInvalid(); return; }
      _org = await FinOpsAuth.getOrgById(_invite.org_id);
      renderInvite();
    }

    function renderInvalid() {
      document.getElementById('card-content').innerHTML = `
        <div class="invalid-card">
          <div style="font-size:2.5rem;margin-bottom:12px">🔗</div>
          <h2>Invite link invalid</h2>
          <p>This invite link has already been used or is no longer valid.<br>Ask your organisation owner to send a new one.</p>
          <a href="login.html" style="display:inline-block;margin-top:16px;color:var(--primary);font-weight:600;text-decoration:none">Go to login →</a>
        </div>`;
    }

    function renderInvite() {
      var orgName = _org ? _org.name : 'your organisation';
      var track   = FinOpsAuth.TRACKS[_invite.track];
      var color   = track ? track.color : 'var(--primary)';
      document.getElementById('card-content').innerHTML = `
        <div class="invite-banner" style="background:${color}18;border:1px solid ${color}33;color:${color}">
          <div class="ib-label">You've been invited to</div>
          <div class="ib-org">${orgName}</div>
          <div class="ib-role">${track ? track.icon + ' ' + track.name + ' track' : ''}</div>
        </div>
        <h1>Create your account</h1>
        <p class="auth-sub">Set up your FinOps Academy account to start your training.</p>
        <div class="auth-error" id="error-msg"></div>
        <form onsubmit="doJoin(event)">
          <div class="form-group">
            <label>Your name</label>
            <input type="text" id="name" placeholder="Alex Johnson" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="alex@company.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="auth-btn" id="join-btn">Join ${orgName} →</button>
        </form>
        <div style="text-align:center;margin-top:18px;font-size:0.82rem;color:var(--text-muted)">
          Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none">Sign in →</a>
        </div>`;
    }

    async function doJoin(e) {
      e.preventDefault();
      var btn = document.getElementById('join-btn');
      var err = document.getElementById('error-msg');
      btn.disabled = true; btn.textContent = 'Joining…';
      err.style.display = 'none';
      var result = await FinOpsAuth.acceptInvite(
        token,
        document.getElementById('name').value,
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      if (result.error) {
        err.textContent = result.error;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Join ' + (_org ? _org.name : 'organisation') + ' →';
      } else {
        var trackDef = result.track ? FinOpsAuth.TRACKS[result.track] : null;
        var trackPage = trackDef ? trackDef.page : 'index.html';
        document.getElementById('card-content').innerHTML = `
          <div style="text-align:center;padding:12px 0">
            <div style="font-size:2.8rem;margin-bottom:16px">📬</div>
            <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px">Check your email</h2>
            <p style="color:var(--text-muted);font-size:0.88rem;line-height:1.6">
              We sent a confirmation link to your email address.<br>
              Click it to activate your account and start your training.
            </p>
            <a href="${trackPage}" style="display:inline-block;margin-top:20px;color:var(--primary);font-weight:600;font-size:0.9rem;text-decoration:none">Go to my track →</a>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>
