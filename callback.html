<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setting up your account… — FinOps Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px;
            padding:48px 44px; width:100%; max-width:420px; text-align:center;
            box-shadow:0 24px 64px rgba(0,0,0,0.4); }
    .spinner { width:40px; height:40px; border:3px solid var(--border);
               border-top-color:var(--primary); border-radius:50%;
               animation:spin 0.8s linear infinite; margin:0 auto 24px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    h2 { font-size:1.2rem; font-weight:800; margin-bottom:8px; }
    p  { color:var(--text-muted); font-size:0.88rem; }
    .error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Confirming your account…</h2>
    <p id="msg">Please wait while we finish setting things up.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    async function init() {
      var user = await FinOpsAuth.completePendingSetup();

      if (!user) {
        // Maybe already set up — try getCurrentUser
        user = await FinOpsAuth.getCurrentUser();
      }

      if (!user) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Something went wrong';
        document.getElementById('msg').innerHTML =
          '<span class="error">We couldn\'t finish setting up your account.</span><br><br>' +
          '<a href="signup.html" style="color:var(--primary);font-weight:600;text-decoration:none">Try signing up again →</a>';
        return;
      }

      // Redirect based on role
      if (user.is_owner) {
        window.location.href = 'dashboard.html';
      } else if (user.track && FinOpsAuth.TRACKS[user.track]) {
        window.location.href = FinOpsAuth.TRACKS[user.track].page;
      } else {
        window.location.href = 'index.html';
      }
    }

    init();
  </script>
</body>
</html>
